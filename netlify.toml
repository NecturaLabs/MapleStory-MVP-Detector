# The authoritative source for Netlify headers is public/_headers,
# which Vite copies to dist/_headers at build time.

[build]
  command = "bun install --frozen-lockfile && bun run build"
  publish = "dist"

# SPA fallback — Vite produces a single index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
